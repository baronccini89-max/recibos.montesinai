<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Irmão - Monte Sinai</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: #f4f7f6;
            min-height: 100vh;
        }

        /* Cabeçalho Azul e Dourado */
        header {
            background: linear-gradient(135deg, #0f2a5a 0%, #1a3a7a 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #d4af37;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-img { width: 70px; height: auto; margin-bottom: 10px; }
        header h1 { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        header p { font-size: 13px; color: #d4af37; font-weight: 600; }
        
        .user-info { font-size: 14px; margin-top: 10px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; display: inline-block; }

        /* Área de Conteúdo */
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        .card {
            background: white; border-radius: 16px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px; text-align: left;
        }

        .card-title { color: #1a3a7a; font-size: 16px; font-weight: 700; margin-bottom: 15px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

        /* Status Financeiro */
        .status-ano { margin-bottom: 15px; padding: 15px; border-radius: 12px; }
        .status-ano:last-child { margin-bottom: 0; }
        
        .ano-titulo { font-weight: 700; font-size: 18px; margin-bottom: 5px; }
        .status-texto { font-size: 14px; line-height: 1.5; }

        .status-ok { background: #e8f5e9; border-left: 4px solid #4CAF50; color: #2e7d32; }
        .status-pendente { background: #fff3cd; border-left: 4px solid #ffc107; color: #856404; }
        .status-erro { background: #ffebee; border-left: 4px solid #f44336; color: #c62828; }

        /* Botão de Comprovante */
        .upload-section { text-align: center; margin-top: 10px; }
        .btn-upload {
            width: 100%; padding: 15px; background: #d4af37; color: #fff; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-upload:hover { background: #b8962e; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        .upload-status { margin-top: 15px; font-size: 13px; font-weight: 600; }

        .btn-sair {
            width: 100%; padding: 12px; background: transparent; color: #f44336; border: 2px solid #f44336; border-radius: 12px;
            font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 20px;
        }
        .btn-sair:hover { background: #f44336; color: white; }

        /* Tela de Carregamento */
        #telaCarregamento {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1a3a7a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="telaCarregamento">
        <div class="spinner"></div>
        <h3 style="color: #1a3a7a;">Autenticando...</h3>
    </div>

    <header>
        <img src="./logo.png" alt="Logo" class="logo-img">
        <h1>Loja Monte Sinai nº 371</h1>
        <p>Portal do Irmão</p>
        <div class="user-info" id="identificacaoIrmao">CIM: Carregando...</div>
    </header>

    <div class="container">
        
        <div class="card">
            <h2 class="card-title">📊 Sua Situação Financeira</h2>
            <div id="areaResultados">
                <div class="status-ano status-pendente">
                    <div class="status-texto">Consultando dados na Tesouraria...</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">🧾 Enviar Comprovante</h2>
            <p style="font-size: 13px; color: #666; margin-bottom: 15px; line-height: 1.5;">
                Fez um pagamento via Pix ou transferência? Envie o comprovante por aqui para a conferência da tesouraria.
            </p>
            <div class="upload-section">
                <!-- Campo invisível que abre a galeria do celular -->
                <input type="file" id="arquivoComprovante" accept="image/*,application/pdf" style="display: none;">
                
                <button class="btn-upload" id="btnUploadClick">
                    + Selecionar e Enviar
                </button>
                <div id="uploadStatus" class="upload-status"></div>
            </div>
        </div>

        <button class="btn-sair" id="btnSair">Sair da Conta</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        // Importando ferramentas de nuvem e banco de dados
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';
        import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAG2f75cmIH7p4tA4AwFoWgQg0DTYRoxW8",
            authDomain: "monte-sinai-recibos.firebaseapp.com",
            projectId: "monte-sinai-recibos",
            storageBucket: "monte-sinai-recibos.firebasestorage.app",
            messagingSenderId: "880791367597",
            appId: "1:880791367597:web:5cbba591d90e41cd56bb24"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const db = getFirestore(app);

        // API da Planilha
        const URL_API_PLANILHAS = 'https://script.google.com/macros/s/AKfycbyP6ubThekx-CPjY9tsDirIgDhwyM-u3OmVvJ7Zzl_6GBisYCWPOGt2Hi9O2UxBjhTPlw/exec';

        const telaCarregamento = document.getElementById('telaCarregamento');
        const identificacaoIrmao = document.getElementById('identificacaoIrmao');
        const areaResultados = document.getElementById('areaResultados');
        const btnSair = document.getElementById('btnSair');
        
        // Elementos do Upload
        const fileInput = document.getElementById('arquivoComprovante');
        const btnUploadClick = document.getElementById('btnUploadClick');
        const uploadStatus = document.getElementById('uploadStatus');

        let cimGlobal = "";

        // Verificação de Segurança
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                cimGlobal = user.displayName;

                if (!cimGlobal) {
                    areaResultados.innerHTML = `<div class="status-ano status-erro"><div class="status-texto">Erro: CIM não encontrado no seu perfil. Por favor, contate o tesoureiro.</div></div>`;
                    telaCarregamento.style.display = 'none';
                    return;
                }

                identificacaoIrmao.innerText = `CIM: ${cimGlobal}`;
                await realizarConsultaFinanceira(cimGlobal);
                telaCarregamento.style.display = 'none';
            } else {
                window.location.replace("index.html");
            }
        });

        // Consulta Financeira na Planilha
        async function realizarConsultaFinanceira(cim) {
            try {
                const response = await fetch(`${URL_API_PLANILHAS}?acao=consulta&cim=${cim}`);
                const data = await response.json();

                if (data.error || (data["2025"] === "" && data["2026"] === "")) {
                    areaResultados.innerHTML = `<div class="status-ano status-erro"><div class="status-texto">⚠️ Nenhum registro financeiro encontrado para o seu CIM. Procure a tesouraria.</div></div>`;
                    return;
                }

                let htmlContent = '';
                ['2025', '2026'].forEach(ano => {
                    const status = (data[ano] || '').toUpperCase();
                    if (status === '' || status === 'PAGO' || status === 'ISENTO') {
                        htmlContent += `<div class="status-ano status-ok"><div class="ano-titulo">${ano}</div><div class="status-texto"><b>Situação Regular ✅</b><br>Não há débitos pendentes neste ano.</div></div>`;
                    } else {
                        htmlContent += `<div class="status-ano status-pendente"><div class="ano-titulo">${ano}</div><div class="status-texto"><b>Pendências encontradas ❌</b><br>Meses em aberto: ${status}</div></div>`;
                    }
                });
                areaResultados.innerHTML = htmlContent;

            } catch (error) {
                areaResultados.innerHTML = `<div class="status-ano status-erro"><div class="status-texto">⚠️ Falha de conexão com os servidores da Tesouraria. Tente novamente mais tarde.</div></div>`;
            }
        }

        // ================= LÓGICA DE ENVIO DO COMPROVANTE =================
        
        // 1. O clique no botão visível aciona o clique no botão invisível de arquivo
        btnUploadClick.addEventListener('click', () => {
            fileInput.click();
        });

        // 2. Quando o usuário escolhe um arquivo
        fileInput.addEventListener('change', async (event) => {
            const arquivo = event.target.files[0];
            
            // Se ele cancelar a seleção, o código para aqui
            if(!arquivo) return;

            // ========================================================
            // NOVA TRAVA DE SEGURANÇA: LIMITE DE PESO DO ARQUIVO (1MB)
            // ========================================================
            const tamanhoMaximoEmBytes = 1 * 1024 * 1024; // 1 Megabyte
            if (arquivo.size > tamanhoMaximoEmBytes) {
                alert('Atenção: O arquivo é muito pesado! Por favor, envie uma imagem ou PDF menor que 1MB.');
                fileInput.value = ''; // Limpa a seleção do usuário para ele tentar de novo
                return; // Impede o upload de continuar
            }

            // Mostra aviso visual na tela
            uploadStatus.style.color = '#1a3a7a';
            uploadStatus.innerText = 'Aguarde. Enviando arquivo para a tesouraria...';
            btnUploadClick.disabled = true;
            btnUploadClick.style.opacity = '0.5';

            try {
                // Cria um caminho seguro na nuvem organizado por CIM
                const caminhoNuvem = `comprovantes/CIM_${cimGlobal}/${Date.now()}_${arquivo.name}`;
                const referenciaNuvem = ref(storage, caminhoNuvem);

                // Faz o upload efetivo
                await uploadBytes(referenciaNuvem, arquivo);

                // Pega o link permanente do arquivo recém enviado
                const linkDownload = await getDownloadURL(referenciaNuvem);

                // Salva o registro no banco de dados para o Tesoureiro ver depois
                await addDoc(collection(db, 'comprovantes_enviados'), {
                    cim: cimGlobal,
                    dataEnvio: new Date().toISOString(),
                    urlComprovante: linkDownload,
                    nomeArquivo: arquivo.name,
                    status: 'Pendente de Conferência'
                });

                // Confirma o sucesso
                uploadStatus.style.color = '#4CAF50';
                uploadStatus.innerText = 'Comprovante enviado com sucesso!';
                
            } catch (erro) {
                console.error(erro);
                uploadStatus.style.color = '#f44336';
                uploadStatus.innerText = 'Erro no envio. Tente novamente.';
            } finally {
                // Restaura o botão e limpa o campo invisível
                btnUploadClick.disabled = false;
                btnUploadClick.style.opacity = '1';
                fileInput.value = ''; 
            }
        });

        // =================================================================

        btnSair.addEventListener('click', () => {
            signOut(auth).then(() => { window.location.replace("index.html"); });
        });
    </script>
</body>
</html>
