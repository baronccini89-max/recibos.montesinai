<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Master - Monte Sinai Nº 371</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; color: #333; }
        
        header { background: linear-gradient(135deg, #0f2a5a 0%, #1a3a7a 100%); color: white; padding: 25px 20px; text-align: center; border-bottom: 4px solid #d4af37; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-img { width: 65px; height: auto; margin-bottom: 10px; }
        header h1 { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        header p { font-size: 14px; color: #d4af37; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .container { padding: 30px 20px; max-width: 1200px; margin: 0 auto; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .dash-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #1a3a7a; }
        .dash-card.verde { border-left-color: #2e7d32; }
        .dash-card.amarelo { border-left-color: #f57f17; }
        .dash-card.vermelho { border-left-color: #c62828; }
        .dash-title { font-size: 13px; color: #666; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; }
        .dash-number { font-size: 32px; font-weight: 800; color: #1a3a7a; }

        .controles-tabela { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        
        .filtro-container { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .input-busca { padding: 10px 15px; border-radius: 8px; border: 1px solid #ccc; font-family: 'Poppins', sans-serif; font-size: 14px; outline: none; width: 250px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .input-busca:focus { border-color: #1a3a7a; }
        .filtro-container select { padding: 10px 15px; border-radius: 8px; border: 1px solid #ccc; font-family: 'Poppins', sans-serif; font-size: 14px; color: #333; outline: none; background: white; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        
        .botoes-acao { display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; border: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-pdf { background: #1a3a7a; color: white; }
        .btn-pdf:hover { background: #2c5aa0; box-shadow: 0 4px 10px rgba(26, 58, 122, 0.2); }
        .btn-sair { background: transparent; border: 2px solid #f44336; color: #f44336; }
        .btn-sair:hover { background: #f44336; color: white; }

        .painel-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }

        table { width: 100%; border-collapse: collapse; min-width: 800px; text-align: left; }
        thead { background: #f8f9fa; border-bottom: 2px solid #e0e0e0; }
        
        th.ordenavel { padding: 15px 20px; color: #1a3a7a; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none; transition: background 0.2s; }
        th.ordenavel:hover { background: #e2e8f0; }
        
        td { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: middle; color: #444; }
        tr:hover { background: #fcfcfc; }

        .badge { padding: 6px 12px; border-radius: 20px; font-weight: 600; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; min-width: 110px; }
        .badge-verde { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .badge-amarelo { background: #fff8e1; color: #f57f17; border: 1px solid #ffecb3; }
        .badge-vermelho { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        .info-pendencia { font-size: 13px; color: #444; margin-top: 5px; display: block; line-height: 1.5; }
        .meses-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .mes-badge { background: #f0f4f8; border: 1px solid #dcdcdc; color: #555; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
        
        .btn-acao { color: white; border: none; padding: 8px 15px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; }
        .btn-acao:hover { opacity: 0.8; }
        .btn-desativado { background: #e0e0e0; color: #999; cursor: not-allowed; }

        #carregando { text-align: center; padding: 60px; color: #1a3a7a; font-weight: 600; font-size: 16px; }
        
        @media print {
            body { background: white; margin: 0; padding: 0; }
            header, .dashboard, .controles-tabela { display: none !important; }
            .container { max-width: 100%; padding: 0; margin: 0; }
            .painel-card { box-shadow: none; border: none; padding: 0; margin: 0; }
            table { border: 1px solid #000; }
            th, td { border: 1px solid #000; padding: 10px; color: #000; font-size: 13px; }
            .badge { background: transparent !important; border: none !important; font-weight: bold; text-align: left; padding: 0; }
            .badge-verde { color: #2e7d32 !important; }
            .badge-amarelo { color: #f57f17 !important; }
            .badge-vermelho { color: #c62828 !important; }
            .mes-badge { border: 1px solid #000; background: transparent; color: #000; }
            .acao-col { display: none; }
            .painel-card::before { content: "Relatório Financeiro - Loja Monte Sinai Nº 371"; display: block; font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 20px; color: #000; }
        }
    </style>
</head>
<body>

    <header>
        <img src="./logo.png" alt="Logo Monte Sinai" class="logo-img">
        <h1>Gestão Master</h1>
        <p>Visão Estratégica da Tesouraria</p>
    </header>

    <div class="container">
        
        <div class="dashboard" id="areaDashboard" style="display: none;">
            <div class="dash-card">
                <div class="dash-title">Total de Irmãos</div>
                <div class="dash-number" id="dashTotal">0</div>
            </div>
            <div class="dash-card verde">
                <div class="dash-title">Irmãos Regulares</div>
                <div class="dash-number" id="dashRegulares">0</div>
            </div>
            <div class="dash-card amarelo">
                <div class="dash-title">Atenção (1 a 5 meses)</div>
                <div class="dash-number" id="dashAtencao">0</div>
            </div>
            <div class="dash-card vermelho">
                <div class="dash-title">Inadimplentes (6+ meses)</div>
                <div class="dash-number" id="dashInadimplentes">0</div>
            </div>
        </div>

        <div class="controles-tabela">
            <div class="filtro-container">
                <input type="text" id="buscaNome" placeholder="🔍 Buscar por nome..." onkeyup="window.aplicarFiltros()" class="input-busca">
                <select id="filtroMeses" onchange="window.aplicarFiltros()">
                    <option value="TODOS">Todos os Status</option>
                    <option value="0">0 meses pendentes (Em Dia)</option>
                    <option value="1-5">1 a 5 meses de atraso</option>
                    <option value="6+">6 ou mais meses de atraso</option>
                </select>
            </div>
            <div class="botoes-acao">
                <button class="btn btn-pdf" onclick="window.print()">📄 Exportar Relatório PDF</button>
                <button class="btn btn-sair" id="btnSair">Sair do Painel</button>
            </div>
        </div>

        <div class="painel-card">
            <div id="carregando">Sincronizando pranchada financeira... ⏳</div>

            <div style="overflow-x: auto;">
                <table id="tabelaMembros" style="display: none;">
                    <thead>
                        <tr>
                            <th class="ordenavel" onclick="window.ordenarTabela('nome')" title="Clique para ordenar">Nome do Irmão ↕️</th>
                            <th class="ordenavel" onclick="window.ordenarTabela('cim')" title="Clique para ordenar">CIM ↕️</th>
                            <th class="ordenavel" onclick="window.ordenarTabela('atrasos')" title="Clique para ordenar">Situação Atual ↕️</th>
                            <th>Detalhes Financeiros</th>
                            <th class="acao-col" style="min-width: 150px;">Ações Manuais</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAG2f75cmIH7p4tA4AwFoWgQg0DTYRoxW8",
            authDomain: "monte-sinai-recibos.firebaseapp.com",
            projectId: "monte-sinai-recibos",
            storageBucket: "monte-sinai-recibos.firebasestorage.app",
            messagingSenderId: "880791367597",
            appId: "1:880791367597:web:5cbba591d90e41cd56bb24"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // A URL PERMANECE A MESMA
        const URL_API_PLANILHAS = 'https://script.google.com/macros/s/AKfycbyP6ubThekx-CPjY9tsDirIgDhwyM-u3OmVvJ7Zzl_6GBisYCWPOGt2Hi9O2UxBjhTPlw/exec';

        const corpoTabela = document.getElementById('corpoTabela');
        const tabelaMembros = document.getElementById('tabelaMembros');
        const carregando = document.getElementById('carregando');
        const btnSair = document.getElementById('btnSair');
        const areaDashboard = document.getElementById('areaDashboard');

        let dadosGlobais = [];
        let ordemAtual = { coluna: 'nome', crescente: true };

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'baronccini89@gmail.com') {
                carregarDadosDaPlanilha();
            if (user && user.email === 'sergioedsonh@yahoo.com.br') {
                carregarDadosDaPlanilha();
            } else if (user) {
                alert('Acesso negado. Esta área é restrita à Gestão Master.');
                window.location.replace("membro.html");
            } else {
                window.location.replace("index.html");
            }
        });

        async function carregarDadosDaPlanilha() {
            try {
                const response = await fetch(`${URL_API_PLANILHAS}?acao=listar_todos`);
                const membrosAPI = await response.json();
                
                if(membrosAPI.error) {
                    carregando.innerHTML = "Erro ao carregar dados da planilha.";
                    return;
                }
                
                dadosGlobais = processarDados(membrosAPI);
                atualizarDashboard();
                window.ordenarTabela('nome');

            } catch (error) {
                carregando.innerHTML = "Falha de conexão com os servidores.";
            }
        }

        function processarDados(membrosAPI) {
            const dataAtual = new Date();
            const mesAtual = dataAtual.getMonth();
            const mapaMeses = { 'JAN': 0, 'FEV': 1, 'MAR': 2, 'ABR': 3, 'MAI': 4, 'JUN': 5, 'JUL': 6, 'AGO': 7, 'SET': 8, 'OUT': 9, 'NOV': 10, 'DEZ': 11 };

            return membrosAPI.map(m => {
                let txt25 = m.p2025 ? m.p2025.toString().trim() : "";
                let txt26 = m.p2026 ? m.p2026.toString().trim() : "";

                let arr25 = (txt25 && txt25.toUpperCase() !== 'PAGO' && txt25.toUpperCase() !== 'ISENTO') ? txt25.split(',').map(x => x.trim()) : [];
                let arr26 = (txt26 && txt26.toUpperCase() !== 'PAGO' && txt26.toUpperCase() !== 'ISENTO') ? txt26.split(',').map(x => x.trim()) : [];
                
                let atrasosCalculados = arr25.length;
                arr26.forEach(mes => {
                    if (mapaMeses[mes] <= mesAtual) { atrasosCalculados++; }
                });

                let grupoAtraso = '0';
                if (atrasosCalculados >= 1 && atrasosCalculados <= 5) grupoAtraso = '1-5';
                else if (atrasosCalculados >= 6) grupoAtraso = '6+';

                return {
                    ...m,
                    textoExato2025: txt25,
                    textoExato2026: txt26,
                    atrasosCalculados: atrasosCalculados,
                    grupoAtraso: grupoAtraso
                };
            });
        }

        function atualizarDashboard() {
            let contRegulares = 0, contAtencao = 0, contInadimplentes = 0;
            
            dadosGlobais.forEach(m => {
                if (m.grupoAtraso === '0') contRegulares++;
                else if (m.grupoAtraso === '1-5') contAtencao++;
                else contInadimplentes++;
            });

            document.getElementById('dashTotal').innerText = dadosGlobais.length;
            document.getElementById('dashRegulares').innerText = contRegulares;
            document.getElementById('dashAtencao').innerText = contAtencao;
            document.getElementById('dashInadimplentes').innerText = contInadimplentes;
            
            areaDashboard.style.display = 'grid';
        }

        window.ordenarTabela = function(colunaClicada) {
            if (ordemAtual.coluna === colunaClicada) {
                ordemAtual.crescente = !ordemAtual.crescente;
            } else {
                ordemAtual.coluna = colunaClicada;
                ordemAtual.crescente = true;
            }

            dadosGlobais.sort((a, b) => {
                let valorA, valorB;
                
                if (colunaClicada === 'nome') { 
                    valorA = a.nome.toLowerCase(); valorB = b.nome.toLowerCase(); 
                }
                else if (colunaClicada === 'cim') { 
                    valorA = parseInt(a.cim) || 0; valorB = parseInt(b.cim) || 0; 
                }
                else if (colunaClicada === 'atrasos') { 
                    valorA = a.atrasosCalculados; valorB = b.atrasosCalculados; 
                }
                
                if (valorA < valorB) return ordemAtual.crescente ? -1 : 1;
                if (valorA > valorB) return ordemAtual.crescente ? 1 : -1;
                return 0;
            });

            window.aplicarFiltros();
        };

        window.aplicarFiltros = function() {
            const termoBusca = document.getElementById('buscaNome').value.toLowerCase();
            const filtroMeses = document.getElementById('filtroMeses').value;

            const dadosFiltrados = dadosGlobais.filter(m => {
                const bateNome = m.nome.toLowerCase().includes(termoBusca);
                const bateFiltro = (filtroMeses === 'TODOS') || (m.grupoAtraso === filtroMeses);
                return bateNome && bateFiltro;
            });

            desenharHTMLTabela(dadosFiltrados);
        };

        function desenharHTMLTabela(dadosParaExibir) {
            let html = '';

            dadosParaExibir.forEach(membro => {
                let corSemaforo = '';
                let textoSemaforo = '';
                let botoesAcao = ''; // Nova lógica para os botões

                // Configuração das Cores e Botões baseados no atraso
                if (membro.atrasosCalculados === 0) {
                    corSemaforo = 'badge-verde'; 
                    textoSemaforo = 'Regular';
                    botoesAcao = `<button class="btn-acao btn-desativado" disabled>Sem ação</button>`;
                } else if (membro.atrasosCalculados >= 1 && membro.atrasosCalculados <= 5) {
                    corSemaforo = 'badge-amarelo'; 
                    textoSemaforo = 'Atenção';
                    // Irmãos com atraso leve têm apenas o botão direto
                    botoesAcao = `<button class="btn-acao" style="background:#d4af37;" onclick="window.notificarIrmao('${membro.nome}', '${membro.cim}', this)" title="Avisa o Irmão diretamente no Telegram">Notificar Irmão</button>`;
                } else {
                    corSemaforo = 'badge-vermelho'; 
                    textoSemaforo = 'Inadimplente';
                    // Irmãos com atraso crítico (6+) têm ambos os botões
                    botoesAcao = `
                        <div style="display:flex; flex-direction:column; gap:6px;">
                            <button class="btn-acao" style="background:#1a3a7a;" onclick="window.dispararAlertaLoja('${membro.nome}', '${membro.cim}', this)" title="Avisa Tesouraria e VM">Alerta Loja (6+)</button>
                            <button class="btn-acao" style="background:#d4af37;" onclick="window.notificarIrmao('${membro.nome}', '${membro.cim}', this)" title="Avisa o Irmão diretamente no Telegram">Notificar Irmão</button>
                        </div>
                    `;
                }

                let textoExibicao25 = membro.textoExato2025 === "" ? "PAGO" : membro.textoExato2025.toUpperCase();
                let textoExibicao26 = membro.textoExato2026 === "" ? "PAGO" : membro.textoExato2026.toUpperCase();
                
                let detalhe2025 = '';
                if (textoExibicao25 !== 'PAGO' && textoExibicao25 !== 'ISENTO') {
                    let badges25 = textoExibicao25.split(',').map(m => `<span class="mes-badge">${m.trim()}</span>`).join('');
                    detalhe2025 = `<div style="margin-bottom: 8px;"><b style="color:#c62828;">2025 (Pendentes):</b> <div class="meses-container">${badges25}</div></div>`;
                }

                let detalhe2026 = '';
                if (textoExibicao26 === 'PAGO') {
                    detalhe2026 = `<div><b>2026:</b> <span style="color:#2e7d32; font-weight:600;">Quitado ✅</span></div>`;
                } else if (textoExibicao26 === 'ISENTO') {
                    detalhe2026 = `<div><b>2026:</b> <span style="color:#888; font-weight:600;">Isento</span></div>`;
                } else {
                    let badges26 = textoExibicao26.split(',').map(m => `<span class="mes-badge">${m.trim()}</span>`).join('');
                    detalhe2026 = `<div><b style="color:#c62828;">2026 (Pendentes):</b> <div class="meses-container">${badges26}</div></div>`;
                }

                let detalheHTML = `<div class="info-pendencia">${detalhe2025}${detalhe2026}</div>`;

                html += `
                    <tr>
                        <td><strong>${membro.nome}</strong></td>
                        <td>${membro.cim}</td>
                        <td>
                            <div class="badge ${corSemaforo}">${textoSemaforo}</div><br>
                            <span style="font-size:11px; color:#888; font-weight: 600;">(${membro.atrasosCalculados} atrasos reais)</span>
                        </td>
                        <td>${detalheHTML}</td>
                        <td class="acao-col">${botoesAcao}</td>
                    </tr>
                `;
            });

            corpoTabela.innerHTML = html;
            carregando.style.display = 'none';
            tabelaMembros.style.display = 'table';
        }

        // Função para o Botão "Alerta Loja (6+)"
        window.dispararAlertaLoja = async function(nomeIrmao, cimIrmao, botaoClicado) {
            botaoClicado.innerText = "Enviando... ⏳";
            botaoClicado.disabled = true;
            botaoClicado.style.opacity = '0.7';

            try {
                const resposta = await fetch(URL_API_PLANILHAS, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ acao: 'alerta_telegram', nome: nomeIrmao, cim: cimIrmao })
                });

                const resultado = await resposta.json();
                if (resultado.status === 'success') {
                    botaoClicado.innerText = "✅ Loja Avisada";
                    botaoClicado.style.background = "#4CAF50";
                } else {
                    throw new Error("Falha na API");
                }
            } catch (error) {
                alert("Erro ao tentar enviar o alerta para a loja.");
                botaoClicado.innerText = "Alerta Loja (6+)";
                botaoClicado.disabled = false;
                botaoClicado.style.opacity = '1';
            }
        };

        // Função para o Botão "Notificar Irmão"
        window.notificarIrmao = async function(nomeIrmao, cimIrmao, botaoClicado) {
            botaoClicado.innerText = "Enviando... ⏳";
            botaoClicado.disabled = true;
            botaoClicado.style.opacity = '0.7';

            try {
                const resposta = await fetch(URL_API_PLANILHAS, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ acao: 'notificar_irmao', nome: nomeIrmao, cim: cimIrmao })
                });

                const resultado = await resposta.json();
                if (resultado.status === 'success') {
                    botaoClicado.innerText = "✅ Irmão Avisado";
                    botaoClicado.style.background = "#4CAF50";
                } else {
                    alert("Atenção: " + resultado.message);
                    botaoClicado.innerText = "Notificar Irmão";
                    botaoClicado.disabled = false;
                    botaoClicado.style.opacity = '1';
                }
            } catch (error) {
                alert("Erro de comunicação com a API.");
                botaoClicado.innerText = "Notificar Irmão";
                botaoClicado.disabled = false;
                botaoClicado.style.opacity = '1';
            }
        };

        btnSair.addEventListener('click', () => {
            signOut(auth).then(() => { window.location.replace("index.html"); });
        });
    </script>
</body>
</html>
