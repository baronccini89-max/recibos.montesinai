<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Master - Monte Sinai Nº 371</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; color: #333; }
        
        header { background: linear-gradient(135deg, #0f2a5a 0%, #1a3a7a 100%); color: white; padding: 20px; text-align: center; border-bottom: 4px solid #d4af37; }
        .logo-img { width: 60px; height: auto; margin-bottom: 10px; }
        header h1 { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        header p { font-size: 14px; color: #d4af37; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }

        .painel-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        .painel-titulo { color: #1a3a7a; font-size: 18px; font-weight: 700; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8f9fa; color: #1a3a7a; font-weight: 600; text-align: left; padding: 12px 15px; border-bottom: 2px solid #e0e0e0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: middle; }
        tr:hover { background: #fcfcfc; }

        .badge { padding: 6px 12px; border-radius: 20px; font-weight: 600; font-size: 12px; display: inline-block; text-align: center; min-width: 100px; }
        .badge-verde { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .badge-amarelo { background: #fff8e1; color: #f57f17; border: 1px solid #ffecb3; }
        .badge-vermelho { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        .info-pendencia { font-size: 12px; color: #666; margin-top: 4px; display: block; }

        .btn-acao { background: #d4af37; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-acao:hover { background: #b8962e; }
        .btn-desativado { background: #e0e0e0; color: #999; cursor: not-allowed; }

        .acoes-topo { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .btn-sair { padding: 8px 15px; border: 1px solid #f44336; color: #f44336; border-radius: 8px; background: transparent; cursor: pointer; font-weight: 600; }
        .btn-sair:hover { background: #f44336; color: white; }
        
        #carregando { text-align: center; padding: 40px; color: #1a3a7a; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <img src="./logo.png" alt="Logo Monte Sinai" class="logo-img">
        <h1>Gestão Master</h1>
        <p>Painel de Controle da Tesouraria</p>
    </header>

    <div class="container">
        <div class="acoes-topo">
            <div style="font-size: 14px; font-weight: 600; color: #555;">Visão em Semáforo</div>
            <button class="btn-sair" id="btnSair">Sair do Painel</button>
        </div>

        <div class="painel-card">
            <h2 class="painel-titulo">Status Financeiro dos Irmãos</h2>
            
            <div id="carregando">Sincronizando dados com a Secretaria... ⏳</div>

            <table id="tabelaMembros" style="display: none;">
                <thead>
                    <tr>
                        <th>Nome do Irmão</th>
                        <th>CIM</th>
                        <th>Situação Atual</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAG2f75cmIH7p4tA4AwFoWgQg0DTYRoxW8",
            authDomain: "monte-sinai-recibos.firebaseapp.com",
            projectId: "monte-sinai-recibos",
            storageBucket: "monte-sinai-recibos.firebasestorage.app",
            messagingSenderId: "880791367597",
            appId: "1:880791367597:web:5cbba591d90e41cd56bb24"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // =====================================================================
        // COLE SUA URL DA API AQUI
        // =====================================================================
        const URL_API_PLANILHAS = 'https://script.google.com/macros/s/AKfycbyP6ubThekx-CPjY9tsDirIgDhwyM-u3OmVvJ7Zzl_6GBisYCWPOGt2Hi9O2UxBjhTPlw/exec';

        const corpoTabela = document.getElementById('corpoTabela');
        const tabelaMembros = document.getElementById('tabelaMembros');
        const carregando = document.getElementById('carregando');
        const btnSair = document.getElementById('btnSair');

        // Lógica de Segurança Restrita (Tesoureiro OU Venerável)
        onAuthStateChanged(auth, (user) => {
            if (user && (user.email === 'baronccini89@gmail.com' || user.email === 'sergioedsonh@yahoo.com.br')) {
                carregarListaMembros();
            } else if (user) {
                alert('Acesso negado. Esta área é restrita à Gestão Master.');
                window.location.replace("membro.html");
            } else {
                window.location.replace("index.html");
            }
        });

        async function carregarListaMembros() {
            try {
                const response = await fetch(`${URL_API_PLANILHAS}?acao=listar_todos`);
                const membros = await response.json();
                
                if(membros.error) {
                    carregando.innerHTML = "Erro ao carregar dados da planilha.";
                    return;
                }
                gerarTabela(membros);
            } catch (error) {
                carregando.innerHTML = "Falha de conexão com os servidores.";
            }
        }

        function gerarTabela(membros) {
            let html = '';
            const mesAtual = new Date().getMonth();
            const mapaMeses = { 'JAN': 0, 'FEV': 1, 'MAR': 2, 'ABR': 3, 'MAI': 4, 'JUN': 5, 'JUL': 6, 'AGO': 7, 'SET': 8, 'OUT': 9, 'NOV': 10, 'DEZ': 11 };

            membros.forEach(membro => {
                let atrasosCount = 0;
                let detalheAtraso = [];

                const status2025 = membro.p2025.toUpperCase();
                if (status2025 && status2025 !== 'PAGO' && status2025 !== 'ISENTO') {
                    const meses25 = status2025.split(',').map(m => m.trim());
                    atrasosCount += meses25.length;
                }

                const status2026 = membro.p2026.toUpperCase();
                if (status2026 && status2026 !== 'PAGO' && status2026 !== 'ISENTO') {
                    const meses26 = status2026.split(',').map(m => m.trim());
                    let atrasosNesteAno = 0;
                    meses26.forEach(m => {
                        if (mapaMeses[m] <= mesAtual) { atrasosNesteAno++; }
                    });
                    atrasosCount += atrasosNesteAno;
                }

                let corSemaforo = '';
                let textoSemaforo = '';
                let botaoNotificar = `<button class="btn-acao btn-desativado" disabled>Sem ação</button>`;

                if (atrasosCount === 0) {
                    corSemaforo = 'badge-verde';
                    textoSemaforo = 'Regular';
                } else if (atrasosCount >= 1 && atrasosCount <= 5) {
                    corSemaforo = 'badge-amarelo';
                    textoSemaforo = 'Atenção';
                } else {
                    corSemaforo = 'badge-vermelho';
                    textoSemaforo = 'Inadimplente';
                    botaoNotificar = `<button class="btn-acao" onclick="alert('Funcionalidade de alerta via Telegram será ativada na próxima etapa do projeto.')">Aprovar Envio</button>`;
                }

                const textoDetalhe = atrasosCount > 0 ? `<span class="info-pendencia">${atrasosCount} meses pendentes</span>` : `<span class="info-pendencia">Em dia</span>`;

                html += `
                    <tr>
                        <td><strong>${membro.nome}</strong></td>
                        <td>${membro.cim}</td>
                        <td>
                            <div class="badge ${corSemaforo}">${textoSemaforo}</div>
                            ${textoDetalhe}
                        </td>
                        <td>${botaoNotificar}</td>
                    </tr>
                `;
            });

            corpoTabela.innerHTML = html;
            carregando.style.display = 'none';
            tabelaMembros.style.display = 'table';
        }

        btnSair.addEventListener('click', () => {
            signOut(auth).then(() => { window.location.replace("index.html"); });
        });
    </script>
</body>
</html>
