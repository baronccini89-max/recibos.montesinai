<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Master - Monte Sinai Nº 371</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; color: #333; }
        
        header { background: linear-gradient(135deg, #0f2a5a 0%, #1a3a7a 100%); color: white; padding: 25px 20px; text-align: center; border-bottom: 4px solid #d4af37; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-img { width: 65px; height: auto; margin-bottom: 10px; }
        header h1 { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        header p { font-size: 14px; color: #d4af37; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .container { padding: 30px 20px; max-width: 1200px; margin: 0 auto; }

        /* Estilo do Dashboard (Cards de Resumo) */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .dash-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #1a3a7a; }
        .dash-card.verde { border-left-color: #2e7d32; }
        .dash-card.vermelho { border-left-color: #c62828; }
        .dash-title { font-size: 13px; color: #666; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; }
        .dash-number { font-size: 32px; font-weight: 800; color: #1a3a7a; }

        .controles-tabela { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        
        .filtro-container { display: flex; align-items: center; gap: 10px; }
        .filtro-container select { padding: 10px 15px; border-radius: 8px; border: 1px solid #ccc; font-family: 'Poppins', sans-serif; font-size: 14px; color: #333; outline: none; background: white; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        
        .botoes-acao { display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; border: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-pdf { background: #1a3a7a; color: white; }
        .btn-pdf:hover { background: #2c5aa0; box-shadow: 0 4px 10px rgba(26, 58, 122, 0.2); }
        .btn-sair { background: transparent; border: 2px solid #f44336; color: #f44336; }
        .btn-sair:hover { background: #f44336; color: white; }

        .painel-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }

        table { width: 100%; border-collapse: collapse; min-width: 800px; text-align: left; }
        thead { background: #f8f9fa; border-bottom: 2px solid #e0e0e0; }
        th { padding: 15px 20px; color: #1a3a7a; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: middle; color: #444; }
        tr:hover { background: #fcfcfc; }

        .badge { padding: 6px 12px; border-radius: 20px; font-weight: 600; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; min-width: 110px; }
        .badge-verde { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .badge-amarelo { background: #fff8e1; color: #f57f17; border: 1px solid #ffecb3; }
        .badge-vermelho { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        .info-pendencia { font-size: 12px; color: #666; margin-top: 5px; display: block; font-weight: 500; }
        .texto-em-dia { color: #2e7d32; font-weight: 600; }

        #carregando { text-align: center; padding: 60px; color: #1a3a7a; font-weight: 600; font-size: 16px; }
        
        /* Regras do PDF (Ativadas na Impressão) */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            header, .dashboard, .controles-tabela { display: none !important; }
            .container { max-width: 100%; padding: 0; margin: 0; }
            .painel-card { box-shadow: none; border: none; padding: 0; margin: 0; }
            table { border: 1px solid #000; }
            th, td { border: 1px solid #000; padding: 10px; color: #000; font-size: 13px; }
            .badge { background: transparent !important; border: none !important; font-weight: bold; text-align: left; padding: 0; }
            .badge-verde { color: #2e7d32 !important; }
            .badge-amarelo { color: #f57f17 !important; }
            .badge-vermelho { color: #c62828 !important; }
            /* Título especial para o PDF */
            .painel-card::before {
                content: "Relatório de Inadimplência - Loja Monte Sinai Nº 371";
                display: block;
                font-size: 20px;
                font-weight: bold;
                text-align: center;
                margin-bottom: 20px;
                color: #000;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="./logo.png" alt="Logo Monte Sinai" class="logo-img">
        <h1>Gestão Master</h1>
        <p>Visão Estratégica da Tesouraria</p>
    </header>

    <div class="container">
        
        <!-- Novo Dashboard -->
        <div class="dashboard" id="areaDashboard" style="display: none;">
            <div class="dash-card">
                <div class="dash-title">Total de Irmãos</div>
                <div class="dash-number" id="dashTotal">0</div>
            </div>
            <div class="dash-card verde">
                <div class="dash-title">Irmãos Regulares</div>
                <div class="dash-number" id="dashRegulares">0</div>
            </div>
            <div class="dash-card amarelo">
                <div class="dash-title">Atenção (1 a 5 meses)</div>
                <div class="dash-number" id="dashAtencao">0</div>
            </div>
            <div class="dash-card vermelho">
                <div class="dash-title">Inadimplentes (6+ meses)</div>
                <div class="dash-number" id="dashInadimplentes">0</div>
            </div>
        </div>

        <div class="controles-tabela">
            <div class="filtro-container">
                <label style="font-size: 14px; font-weight: 600; color: #555;">Filtrar por Status:</label>
                <select id="filtroStatus" onchange="window.filtrarTabela()">
                    <option value="TODOS">Todos os Irmãos</option>
                    <option value="REGULAR">Apenas Regulares (Verde)</option>
                    <option value="ATENCAO">Atenção (Amarelo)</option>
                    <option value="INADIMPLENTE">Inadimplentes (Vermelho)</option>
                </select>
            </div>
            <div class="botoes-acao">
                <button class="btn btn-pdf" onclick="window.print()">📄 Exportar Relatório PDF</button>
                <button class="btn btn-sair" id="btnSair">Sair do Painel</button>
            </div>
        </div>

        <div class="painel-card">
            <div id="carregando">Sincronizando pranchada financeira com a secretaria... ⏳</div>

            <div style="overflow-x: auto;">
                <table id="tabelaMembros" style="display: none;">
                    <thead>
                        <tr>
                            <th>Nome do Irmão</th>
                            <th>CIM</th>
                            <th>Situação Atual</th>
                            <th>Detalhes Financeiros</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAG2f75cmIH7p4tA4AwFoWgQg0DTYRoxW8",
            authDomain: "monte-sinai-recibos.firebaseapp.com",
            projectId: "monte-sinai-recibos",
            storageBucket: "monte-sinai-recibos.firebasestorage.app",
            messagingSenderId: "880791367597",
            appId: "1:880791367597:web:5cbba591d90e41cd56bb24"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Mantém a mesma URL
        const URL_API_PLANILHAS = 'https://script.google.com/macros/s/AKfycbyP6ubThekx-CPjY9tsDirIgDhwyM-u3OmVvJ7Zzl_6GBisYCWPOGt2Hi9O2UxBjhTPlw/exec';

        const corpoTabela = document.getElementById('corpoTabela');
        const tabelaMembros = document.getElementById('tabelaMembros');
        const carregando = document.getElementById('carregando');
        const btnSair = document.getElementById('btnSair');
        const areaDashboard = document.getElementById('areaDashboard');

        // Nomes dos meses para a inteligência visual
        const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'baronccini89@gmail.com') {
                carregarListaMembros();
            } else if (user) {
                alert('Acesso negado. Esta área é restrita à Gestão Master.');
                window.location.replace("membro.html");
            } else {
                window.location.replace("index.html");
            }
        });

        async function carregarListaMembros() {
            try {
                const response = await fetch(`${URL_API_PLANILHAS}?acao=listar_todos`);
                const membros = await response.json();
                
                if(membros.error) {
                    carregando.innerHTML = "Erro ao carregar dados da planilha.";
                    return;
                }
                gerarTabelaEDashboard(membros);
            } catch (error) {
                carregando.innerHTML = "Falha de conexão com os servidores.";
            }
        }

        function gerarTabelaEDashboard(membros) {
            let html = '';
            
            const dataAtual = new Date();
            const mesAtual = dataAtual.getMonth();
            const anoAtual = dataAtual.getFullYear();
            const nomeMesAtual = nomesMeses[mesAtual];

            const mapaMeses = { 'JAN': 0, 'FEV': 1, 'MAR': 2, 'ABR': 3, 'MAI': 4, 'JUN': 5, 'JUL': 6, 'AGO': 7, 'SET': 8, 'OUT': 9, 'NOV': 10, 'DEZ': 11 };

            let contRegulares = 0;
            let contAtencao = 0;
            let contInadimplentes = 0;

            membros.forEach(membro => {
                let atrasosCount = 0;
                let listaMesesAtrasados = [];

                const status2025 = membro.p2025.toUpperCase();
                if (status2025 && status2025 !== 'PAGO' && status2025 !== 'ISENTO') {
                    const array25 = status2025.split(',').map(m => m.trim());
                    atrasosCount += array25.length;
                    listaMesesAtrasados.push(`2025: ${status2025}`);
                }

                const status2026 = membro.p2026.toUpperCase();
                if (status2026 && status2026 !== 'PAGO' && status2026 !== 'ISENTO') {
                    const array26 = status2026.split(',').map(m => m.trim());
                    let mesesAtrasados26 = [];
                    array26.forEach(m => {
                        if (mapaMeses[m] <= mesAtual) { 
                            atrasosCount++; 
                            mesesAtrasados26.push(m);
                        }
                    });
                    if(mesesAtrasados26.length > 0) {
                        listaMesesAtrasados.push(`2026: ${mesesAtrasados26.join(', ')}`);
                    }
                }

                let corSemaforo = '';
                let textoSemaforo = '';
                let textoDetalhe = '';
                let idFiltro = '';

                if (atrasosCount === 0) {
                    corSemaforo = 'badge-verde';
                    textoSemaforo = 'Regular';
                    idFiltro = 'REGULAR';
                    textoDetalhe = `<span class="info-pendencia texto-em-dia">Em dia até ${nomeMesAtual} de ${anoAtual}</span>`;
                    contRegulares++;
                } else if (atrasosCount >= 1 && atrasosCount <= 5) {
                    corSemaforo = 'badge-amarelo';
                    textoSemaforo = 'Atenção';
                    idFiltro = 'ATENCAO';
                    textoDetalhe = `<span class="info-pendencia"><b>${atrasosCount} meses pendentes:</b><br>${listaMesesAtrasados.join('<br>')}</span>`;
                    contAtencao++;
                } else {
                    corSemaforo = 'badge-vermelho';
                    textoSemaforo = 'Inadimplente';
                    idFiltro = 'INADIMPLENTE';
                    textoDetalhe = `<span class="info-pendencia" style="color:#c62828;"><b>${atrasosCount} meses pendentes:</b><br>${listaMesesAtrasados.join('<br>')}</span>`;
                    contInadimplentes++;
                }

                // O atributo data-status ajuda o filtro a esconder as linhas corretas
                html += `
                    <tr data-status="${idFiltro}">
                        <td><strong>${membro.nome}</strong></td>
                        <td>${membro.cim}</td>
                        <td><div class="badge ${corSemaforo}">${textoSemaforo}</div></td>
                        <td>${textoDetalhe}</td>
                    </tr>
                `;
            });

            // Atualiza os números do Dashboard
            document.getElementById('dashTotal').innerText = membros.length;
            document.getElementById('dashRegulares').innerText = contRegulares;
            document.getElementById('dashAtencao').innerText = contAtencao;
            document.getElementById('dashInadimplentes').innerText = contInadimplentes;

            // Mostra os elementos na tela
            corpoTabela.innerHTML = html;
            carregando.style.display = 'none';
            areaDashboard.style.display = 'grid';
            tabelaMembros.style.display = 'table';
        }

        // Função do Filtro Select
        window.filtrarTabela = function() {
            const filtro = document.getElementById('filtroStatus').value;
            const linhas = document.querySelectorAll('#corpoTabela tr');
            
            linhas.forEach(linha => {
                const statusDaLinha = linha.getAttribute('data-status');
                if(filtro === 'TODOS' || statusDaLinha === filtro) {
                    linha.style.display = '';
                } else {
                    linha.style.display = 'none';
                }
            });
        };

        btnSair.addEventListener('click', () => {
            signOut(auth).then(() => { window.location.replace("index.html"); });
        });
    </script>
</body>
</html>
