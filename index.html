<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Monte Sinai</title>
    <style>
        /* ================= ESTILOS GERAIS ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2a5a 0%, #1a3a7a 50%, #d4af37 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
        }

        .logo-img {
            width: 120px;
            height: auto;
            object-fit: contain;
            margin: 0 auto 20px;
            display: block;
        }

        h2 {
            color: #1a3a7a;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        input {
            padding: 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
            background-color: white;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a3a7a 0%, #2c5aa0 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 58, 122, 0.3);
        }

        .error-msg {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
        }

        .rodape {
            margin-top: 25px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="./logo.png" alt="Logo Monte Sinai" class="logo-img">
        <h2>Acesso Restrito</h2>
        <p>Aplicativo da Tesouraria</p>

        <div class="form-group">
            <input type="email" id="emailInput" placeholder="Seu e-mail">
            <input type="password" id="senhaInput" placeholder="Sua senha">
        </div>

        <button id="btnEntrar">Entrar no App</button>
        <div id="errorMsg" class="error-msg">E-mail ou senha incorretos.</div>

        <div class="rodape" style="margin-top: 20px;">
            <a href="cadastro.html" style="color: #1a3a7a; text-decoration: none; font-weight: 600; font-size: 14px;">Primeiro acesso? Crie sua conta</a>
            <div style="margin-top: 15px; font-size: 11px;">Loja Simbólica Monte Sinai nº 371</div>
        </div>
    </div>

    <!-- Importação dos módulos de Autenticação do Firebase -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    // 1. Configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAG2f75cmIH7p4tA4AwFoWgQg0DTYRoxW8",
        authDomain: "monte-sinai-recibos.firebaseapp.com",
        projectId: "monte-sinai-recibos",
        storageBucket: "monte-sinai-recibos.firebasestorage.app",
        messagingSenderId: "880791367597",
        appId: "1:880791367597:web:5cbba591d90e41cd56bb24"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 2. O "Olheiro" Automático: Controla os destinos
    onAuthStateChanged(auth, (user) => {
        if (user) {
            const emailLogado = user.email.toLowerCase().trim();
            
            // Regra Master: Lucas e Sergio vão para o Portal
            if (emailLogado === 'baronccini89@gmail.com' || emailLogado === 'sergioedsonh@yahoo.com.br') {
                window.location.replace("portal.html");
            } else {
                window.location.replace("membro.html");
            }
        }
    });

    // 3. Captura dos elementos exatos da tela
    const emailInput = document.getElementById('email');
    const pinInput = document.getElementById('pin');
    const btnAceder = document.querySelector('button'); // Pega o botão da sua tela

    // 4. A Função de Login Inteligente
    function fazerLogin() {
        const email = emailInput.value.trim();
        const pin = pinInput.value.trim();

        if (!email || !pin) {
            alert("Amado Irmão, por favor preencha o E-mail e o PIN.");
            return;
        }

        const textoOriginal = btnAceder.innerText;
        btnAceder.innerText = "Verificando...";
        btnAceder.disabled = true;

        signInWithEmailAndPassword(auth, email, pin)
            .catch((error) => {
                console.error("Erro no login:", error);
                alert("Erro ao aceder: Verifique se o e-mail e o PIN estão corretos.");
                btnAceder.innerText = textoOriginal;
                btnAceder.disabled = false;
            });
    }

    // 5. Ativando o Gatilho do Botão e da Tecla Enter
    if (btnAceder) {
        btnAceder.addEventListener('click', (e) => {
            e.preventDefault(); // Impede a página de recarregar sozinha
            fazerLogin();
        });
    }

    if (pinInput) {
        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                fazerLogin();
            }
        });
    }
</script>
</body>
</html>
